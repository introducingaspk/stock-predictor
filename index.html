<!DOCTYPE html>
<html>
<head>
    <title>Stock Predictor</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            margin: 0;
            color: white;
        }

        .container {
            margin-top: 40px;
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            width: 380px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        input {
            margin: 10px;
            padding: 10px;
            width: 90%;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            white-space: pre-line;
        }

        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📈 Stock Predictor</h2>

    <input type="text" id="symbol" placeholder="Enter stock (AAPL, TSLA)">

    <button onclick="predict()">Predict</button>

    <div id="result"></div>

    <canvas id="chart"></canvas>

</div>

<script>

let chart;

// 🚀 Fetch prediction
async function predict() {

    const symbol = document.getElementById("symbol").value.trim().toUpperCase();
    const resultBox = document.getElementById("result");

    if (!symbol) {
        resultBox.innerText = "⚠️ Enter stock symbol";
        return;
    }

    resultBox.innerText = "⏳ Fetching...";

    try {
        // 🔮 Prediction API
        const response = await fetch("http://16.171.8.174:5000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ symbol })
        });

        const data = await response.json();

        if (data.error) {
            resultBox.innerText = "❌ " + data.error;
            return;
        }

        const current = data.current_price;
        const predicted = data.predicted_price;

        resultBox.innerText =
            `📊 ${data.symbol}
💰 Current: ₹ ${current.toFixed(2)}
🔮 Predicted: ₹ ${predicted.toFixed(2)}`;

        // 📊 Load chart
        loadHistory(symbol, predicted);

    } catch (error) {
        console.error(error);
        resultBox.innerText = "❌ API Error";
    }
}

// 📊 Fetch historical data
async function loadHistory(symbol, predictedPrice) {
    try {
        const res = await fetch(`http://16.171.8.174:5000/history/${symbol}`);
        const data = await res.json();

        if (data.error) return;

        const prices = data.prices;
        const timestamps = data.timestamps;

        // 🕒 Convert timestamps
        const labels = timestamps.map(ts => {
            const d = new Date(ts * 1000);
            return d.toLocaleDateString();
        });

        // ➕ Add prediction point
        labels.push("Next");
        prices.push(predictedPrice);

        drawChart(labels, prices);

    } catch (err) {
        console.log(err);
    }
}

// 📈 Draw chart
function drawChart(labels, prices) {

    const ctx = document.getElementById("chart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Stock Price + Prediction",
                data: prices,
                borderWidth: 2,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    ticks: {
                        callback: val => "₹ " + val
                    }
                }
            }
        }
    });
}

</script>

</body>
</html>
